<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wich Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Kanit', sans-serif;
            scroll-behavior: smooth;
        }

        :root {
            --bg-color: #060608;
            --card-bg: #111116;
            --accent-cyan: #00f2fe;
            --accent-purple: #4facfe;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --gradient-primary: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* เพิ่มส่วน "เพื่อนร่วมทีมฝากข้อความ" ด้านล่างนี้ */
        .team-messages {
            padding: 80px 10%;
            background: var(--card-bg);
            margin: 40px 10%;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        .team-messages h2 {
            text-align: center;
            margin-bottom: 40px;
            color: var(--accent-cyan);
        }

        .message {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            border-left: 4px solid var(--accent-cyan);
        }
    </style>
</head>
<body>

    <!-- ใส่โค้ดที่คุณส่งมาทั้งหมดตรงนี้ (ส่วนที่เหลือ) -->

    <!-- ส่วนเพื่อนร่วมทีมฝากข้อความ (เพิ่มไว้ท้ายก่อน footer) -->
    <section class="team-messages">
        <h2>เพื่อนร่วมทีมฝากข้อความ</h2>
        <!-- โอมและไอซ์จะมาเพิ่มข้อความตรงนี้ -->
        <div class="message">
            <strong>ยังไม่มีข้อความจากเพื่อน</strong>
        </div>
    </section>

    <!-- ใส่ส่วน footer และส่วนอื่น ๆ ที่เหลือจากโค้ดเดิมของคุณ -->

</body>
</html>
